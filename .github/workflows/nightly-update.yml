name: Nightly Data Update

on:
  schedule:
    # 20:00 UTC = 06:00 AEST (currently) / 07:00 AEDT (Oct-Apr in NSW/VIC/ACT/TAS/SA)
    - cron: "0 20 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  actions: write

# Prevent overlapping runs from racing on data/vessels.json, etc.
concurrency:
  group: nightly-update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run data collection pipeline
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          COLLECTION_DURATION: "1800"
        run: python -m pipeline.orchestrator

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "data: nightly update $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
